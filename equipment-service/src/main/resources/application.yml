server:
  port: 8082

grpc:
  server:
    port: 9092
    reflection:
      enabled: true
  client:
    user-service:
      address: static://localhost:9091
      negotiation-type: plaintext

spring:
  application:
    name: equipment-service

  datasource:
    url: jdbc:postgresql://localhost:5434/heavyrent_equipment
    username: equipment_service
    password: equipment_secret

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8080/realms/heavyrent/protocol/openid-connect/certs