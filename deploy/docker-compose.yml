services:

  # ─── Kafka (KRaft mode, single node) ─────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: heavyrent-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: OZCxzl8DQHOBdJ-dm4_ewA
    ports:
      - "29092:29092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - heavyrent-net

  # ─── Envoy Gateway ─────────────────────────────────────────
  envoy:
    image: envoyproxy/envoy:v1.32-latest
    container_name: heavyrent-envoy-gateway
    volumes:
      - ./envoy/envoy.yaml:/etc/envoy/envoy.yaml
      - ../grpc-contracts/build/descriptors/proto.pb:/etc/envoy/proto.pb
    command: ["envoy", "-c", "/etc/envoy/envoy.yaml"]
    depends_on:
      keycloak:
        condition: service_healthy
    ports:
      - "8000:8000"
      - "9901:9901"
    networks:
      - heavyrent-net

  # ─── Keycloak ─────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: heavyrent-keycloak
    command: start-dev
    volumes:
      - ../infrastructure/keycloak-kafka-plugin/build/libs/keycloak-kafka-plugin.jar:/opt/keycloak/providers/keycloak-kafka-plugin.jar
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_secret
      KC_LOG_LEVEL: INFO
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8080
      KC_HOSTNAME_STRICT: false
    ports:
      - "8080:8080"
    depends_on:
      keycloak-db:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - heavyrent-net
    healthcheck:
      test: ["CMD", "bash", "-c", "cat /dev/null > /dev/tcp/localhost/8080"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  # ─── Keycloak DB ──────────────────────────────────────────
  keycloak-db:
    image: postgres:16-alpine
    container_name: heavyrent-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_secret
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - heavyrent-net

  # ─── User Service DB ──────────────────────────────────────
  user-db:
    image: postgres:16-alpine
    container_name: heavyrent-user-db
    environment:
      POSTGRES_DB: heavyrent_users
      POSTGRES_USER: user_service
      POSTGRES_PASSWORD: user_secret
    ports:
      - "5433:5432"
    volumes:
      - user_db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user_service -d heavyrent_users" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - heavyrent-net

  # ─── Equipment Service DB ─────────────────────────────────
  equipment-db:
    image: postgres:16-alpine
    container_name: heavyrent-equipment-db
    environment:
      POSTGRES_DB: heavyrent_equipment
      POSTGRES_USER: equipment_service
      POSTGRES_PASSWORD: equipment_secret
    ports:
      - "5434:5432"
    volumes:
      - equipment_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U equipment_service -d heavyrent_equipment"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - heavyrent-net

# ─── Volumes & Networks ────────────────────────────────────
volumes:
  keycloak_db_data:
  kafka_data:
  equipment_db_data:
  user_db_data:

networks:
  heavyrent-net:
    driver: bridge