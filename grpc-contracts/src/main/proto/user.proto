syntax = "proto3";
import "google/protobuf/timestamp.proto";
import "google/api/annotations.proto";

package user;

option java_package = "com.heavyrent.grpc.user";
option java_multiple_files = true;

enum UserStatus {
  UNVERIFIED = 0;
  ACTIVE = 1;
  INACTIVE = 2;
  BANNED = 3;
}

enum UserRole {
  UNKNOWN = 0;
  RENTER = 1;
  OWNER = 2;
  ADMIN = 3;
}

service UserGrpcService {
  rpc GetUserByPublicId (GetUserByPublicIdRequest) returns (UserGrpcResponse){
    option (google.api.http) = {
      get: "/api/users/{public_id}"
    };
  }

  rpc GetUserByKeycloakId (GetUserByKeycloakIdRequest) returns (UserGrpcResponse);

  rpc GetCurrentUser (GetCurrentUserRequest) returns (UserGrpcResponse) {
    option (google.api.http) = {
      get: "/api/users/me"
    };
  }
}

message GetUserByPublicIdRequest {
  string public_id = 1;
}

message GetUserByKeycloakIdRequest {
  string keycloak_id = 1;
}

message GetCurrentUserRequest {}

message UserGrpcResponse {
  string keycloak_id = 1;
  string public_id = 2;
  string email = 3;
  string first_name = 4;
  string last_name = 5;
  string phone = 6;
  bool is_verified = 7;
  UserStatus status = 8;
  UserRole role = 9;
  google.protobuf.Timestamp  updated_at = 10;
}
