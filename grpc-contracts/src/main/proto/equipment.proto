syntax = "proto3";
import "google/protobuf/timestamp.proto";
import "google/api/annotations.proto";
import "google/protobuf/wrappers.proto";

package equipment;

option java_package = "com.heavyrent.grpc.equipment";
option java_multiple_files = true;

enum EquipmentType {
  EQUIPMENT_TYPE_UNSPECIFIED = 0;
  CRANE = 1;
  TRUCK = 2;
  BULLDOZER = 3;
  LOADER = 4;
  COMPACTOR = 5;
  CONCRETE_MIXER = 6;
  GENERATOR = 7;
  OTHER = 8;
  EXCAVATOR = 9;
}

enum DeliveryType {
  DELIVERY_TYPE_UNSPECIFIED = 0;
  TRAILER_NEEDED = 1;
  DELIVERY_AVAILABLE = 2;
  SELF_PROPELLED = 3;
  DELIVERY_NOT_DETERMINED = 4;
}

enum EquipmentStatus {
  EQUIPMENT_STATUS_UNSPECIFIED = 0;
  ON_SITE = 1;
  MAINTENANCE = 2;
  UNAVAILABLE = 3;
  FREE = 4;
  STATUS_NOT_DETERMINED = 5;
}

service EquipmentGrpcService {
  rpc GetEquipmentById(GetEquipmentByIdRequest) returns (EquipmentGrpcResponse) {
    option (google.api.http) = {
      get: "/api/equipment/{equipment_id}"
    };
  }
  rpc CreateEquipment (EquipmentCreateRequest) returns (EquipmentGrpcResponse) {
    option (google.api.http) = {
      post: "/api/equipment"
    };
  }
  rpc GetListEquipment(ListEquipmentRequest) returns (EquipmentListResponse) {
    option (google.api.http) = {
      get: "/api/equipment"
    };
  }
}

message GetEquipmentByIdRequest {
  string equipment_id = 1;
}

message ListEquipmentRequest {
  string owner_id = 1;
  string name = 2;
  string model = 3;
  google.protobuf.Int32Value max_price_per_hour_cents = 4;
  EquipmentType type = 5;
  EquipmentStatus equipment_status = 6;
  int32 page = 7;
  int32 page_size = 8;
}

message EquipmentListResponse {
  repeated EquipmentGrpcResponse equipment = 1;
  int32 total_count = 2;
}

message EquipmentCreateRequest {
  string name = 1;
  EquipmentType type = 2;
  string registration_number = 3;
  string brand = 4;
  string model = 5;
  int64 price_per_hour_cents = 6;
  int32 year_of_manufacture = 7;
  bool has_operator = 8;
  bool has_accreditation = 9;
  DeliveryType delivery_type = 10;
  EquipmentStatus equipment_status = 11;
  google.protobuf.Timestamp available_from = 12;
  double latitude = 13;
  double longitude = 14;
}

message EquipmentGrpcResponse {
  string name = 1;
  string equipment_id = 2;
  EquipmentType type = 3;
  string registration_number = 4;
  string brand = 5;
  string model = 6;
  int64 price_per_hour_cents = 7;
  int32 year_of_manufacture = 8;
  bool has_operator = 9;
  bool has_accreditation = 10;
  DeliveryType delivery_type = 11;
  EquipmentStatus equipment_status = 12;
  google.protobuf.Timestamp available_from = 13;
  double latitude = 14;
  double longitude = 15;
  google.protobuf.Timestamp created_at = 16;
  google.protobuf.Timestamp updated_at = 17;
}

